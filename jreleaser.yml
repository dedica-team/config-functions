release:
  # GitHub token must be provided via JRELEASER_GITHUB_TOKEN env var
  github:
    enabled: true
    # We create releases from a Git tag, JReleaser does not have to create it.
    skipTag: true
    skipRelease: true

signing:
  active: ALWAYS
  pgp:
    active: ALWAYS
    armored: true

deploy:
  maven:
    mavenCentral:
      # Credentials must be provided via JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME / JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD env vars
      sonatype:
        active: RELEASE
        url: https://central.sonatype.com/api/v1/publisher
        stagingRepositories:
          - target/staging-deploy
        snapshotSupported: false
        # UPLOAD: Only upload a new release, must be published manually.
        # PUBLISH: Publish an already uploaded release (Deployment-ID is required for this).
        # FULL: Upload and immediately publish a release.
        stage: UPLOAD
